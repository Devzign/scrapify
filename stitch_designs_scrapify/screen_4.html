<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#bbf7d0",
                    "secondary-container": "#f1f5f9",
                    "on-background": "#0f172a",
                    "tertiary-fixed-dim": "#ffb1c1",
                    "on-surface": "#0f172a",
                    "error-container": "#fee2e2",
                    "error": "#ef4444",
                    "on-secondary-container": "#1e293b",
                    "surface-dim": "#f3f4ee",
                    "secondary-fixed-dim": "#e2e8f0",
                    "outline": "#689c71",
                    "on-tertiary-fixed": "#390918",
                    "primary": "#689c71",
                    "tertiary-fixed": "#ffd9df",
                    "on-surface-variant": "#475569",
                    "on-secondary-fixed-variant": "#334155",
                    "background": "#f7f7f7",
                    "on-primary-container": "#14532d",
                    "on-error-container": "#991b1b",
                    "on-tertiary-container": "#390918",
                    "surface-bright": "#ffffff",
                    "primary-fixed": "#dcfce7",
                    "inverse-surface": "#1e293b",
                    "on-error": "#ffffff",
                    "tertiary": "#884958",
                    "tertiary-container": "#ffd9df",
                    "surface-variant": "#f1f5f9",
                    "surface-tint": "#689c71",
                    "primary-container": "#dcfce7",
                    "secondary-fixed": "#f1f5f9",
                    "inverse-primary": "#9dd3a4",
                    "on-secondary-fixed": "#0f172a",
                    "on-primary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#e2e8f0",
                    "inverse-on-surface": "#f8fafc",
                    "secondary": "#475569",
                    "on-primary-fixed": "#064e3b",
                    "surface-container-low": "#f7f7f7",
                    "surface-container": "#f1f5f9",
                    "outline-variant": "#e2e8f0",
                    "on-tertiary-fixed-variant": "#6f3443",
                    "on-primary-fixed-variant": "#14532d",
                    "surface-container-highest": "#cbd5e1",
                    "surface": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#f7f7f7] text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 w-full top-0 border-b-[1px] border-slate-100/50 shadow-sm flex justify-between items-center px-6 py-4 z-50 sticky">
<div class="flex items-center gap-4">
<button class="transition-all duration-200 active:scale-95 text-[#689c71]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-['Inter'] font-extrabold text-2xl tracking-tight text-[#689c71]">Reschedule Pickup</h1>
<span class="text-[12px] font-medium text-slate-500">पुनर्निर्धारण का अनुरोध करें</span>
</div>
</div>
<button class="transition-all duration-200 active:scale-95 text-[#689c71]">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<main class="flex-grow container mx-auto px-6 py-8 pb-32 max-w-2xl">
<!-- Status Card -->
<div class="bg-surface-bright rounded-xl p-6 mb-8 shadow-sm flex items-center gap-4 border-l-4 border-primary">
<div class="h-12 w-12 bg-primary-container rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="info">info</span>
</div>
<div>
<p class="text-sm font-medium text-on-surface-variant">Active Pickup #SC9022</p>
<p class="text-lg font-bold">Sector 45, Green Park</p>
</div>
</div>
<section class="space-y-6">
<div class="flex flex-col gap-1">
<h2 class="text-xl font-bold text-on-surface">Select a Reason</h2>
<p class="text-sm text-on-surface-variant">Please let the customer know why you cannot make it.</p>
</div>
<!-- Bento Grid Reason Selection -->
<div class="grid grid-cols-2 gap-4">
<!-- Vehicle Breakdown -->
<button class="bg-surface-bright p-6 rounded-2xl shadow-sm border-2 border-transparent hover:border-primary/20 hover:bg-slate-50 transition-all flex flex-col items-center text-center gap-4 group active:scale-95">
<div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-primary group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-[32px]" data-icon="car_repair">car_repair</span>
</div>
<div>
<p class="font-bold text-sm">Vehicle Breakdown</p>
<p class="text-[10px] text-slate-500 uppercase tracking-wider mt-1">वाहन खराब</p>
</div>
</button>
<!-- Heavy Traffic -->
<button class="bg-surface-bright p-6 rounded-2xl shadow-sm border-2 border-transparent hover:border-primary/20 hover:bg-slate-50 transition-all flex flex-col items-center text-center gap-4 group active:scale-95">
<div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-primary group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-[32px]" data-icon="traffic">traffic</span>
</div>
<div>
<p class="font-bold text-sm">Heavy Traffic</p>
<p class="text-[10px] text-slate-500 uppercase tracking-wider mt-1">भारी जाम</p>
</div>
</button>
<!-- Personal Emergency -->
<button class="bg-surface-bright p-6 rounded-2xl shadow-sm border-2 border-transparent hover:border-primary/20 hover:bg-slate-50 transition-all flex flex-col items-center text-center gap-4 group active:scale-95">
<div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-primary group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-[32px]" data-icon="emergency_home">emergency_home</span>
</div>
<div>
<p class="font-bold text-sm">Personal Emergency</p>
<p class="text-[10px] text-slate-500 uppercase tracking-wider mt-1">व्यक्तिगत आपात</p>
</div>
</button>
<!-- Other -->
<button class="bg-surface-bright p-6 rounded-2xl shadow-sm border-2 border-transparent hover:border-primary/20 hover:bg-slate-50 transition-all flex flex-col items-center text-center gap-4 group active:scale-95">
<div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-primary group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-[32px]" data-icon="more_horiz">more_horiz</span>
</div>
<div>
<p class="font-bold text-sm">Other Reason</p>
<p class="text-[10px] text-slate-500 uppercase tracking-wider mt-1">अन्य कारण</p>
</div>
</button>
</div>
<!-- Additional Context / Note -->
<div class="space-y-3">
<label class="text-sm font-semibold px-1">Additional Details (Optional)</label>
<textarea class="w-full bg-white border-0 rounded-2xl p-4 shadow-sm focus:ring-2 focus:ring-primary/20 placeholder:text-slate-400 text-sm" placeholder="Briefly explain the situation for the customer..." rows="3"></textarea>
</div>
</section>
<!-- Action Area -->
<div class="mt-12 space-y-4">
<button class="w-full bg-primary text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
<span>Send Request to Customer</span>
<span class="material-symbols-outlined" data-icon="send">send</span>
</button>
<button class="w-full bg-white text-secondary py-4 rounded-2xl font-bold text-lg border-2 border-secondary/10 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
<span>Call Support</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe bg-white dark:bg-slate-900 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-50 rounded-t-3xl">
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-[#689c71] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[12px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#689c71] font-bold transition-all" href="#">
<span class="material-symbols-outlined" data-icon="calendar_today" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span class="font-['Inter'] text-[12px] font-medium">Pickups</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-[#689c71] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="eco">eco</span>
<span class="font-['Inter'] text-[12px] font-medium">Eco-Stats</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-[#689c71] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[12px] font-medium">Account</span>
</a>
</nav>
<!-- Side Decoration (Eco-Premium Visual) -->
<div class="fixed top-1/2 -right-16 w-32 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-0 -left-16 w-48 h-48 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
